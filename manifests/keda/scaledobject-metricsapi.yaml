---
# Variant A: KEDA "metrics-api" trigger.
#
# This is the simpler path: KEDA scrapes the waker's /scaler endpoint
# directly (no Prometheus dependency, no bearer token). Recommended for
# workshops and demos.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: mc-ragnarok
  labels:
    app.kubernetes.io/part-of: mc-ragnarok
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mc-ragnarok           # the existing minecraft Deployment
  minReplicaCount: 0
  maxReplicaCount: 1
  pollingInterval: 15           # seconds between trigger evaluations
  cooldownPeriod: 60            # seconds at value=0 before scaling to minReplicaCount
                                # (60s = workshop-friendly; bump to 600+ for production)
  fallback:
    failureThreshold: 3
    replicas: 1                 # if the waker is unreachable, fail OPEN (server stays up)
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 0
  triggers:
    - type: metrics-api
      metadata:
        # HPA formula: desiredReplicas = ceil(metric / targetValue).
        # The waker's metric is 0 or 1, so targetValue=1 -> 1 replica when hot.
        targetValue: "1"
        url: "http://mc-ragnarok-waker.minecraft.svc.cluster.local:8080/scaler"
        valueLocation: "value"
        # ACTIVATION gate (scale-to-zero). The SO is "inactive" (replicas=0)
        # while metric <= activationTargetValue. With a 0/1 metric this MUST
        # be 0 — otherwise the deployment can never come back from zero.
        activationTargetValue: "0"
