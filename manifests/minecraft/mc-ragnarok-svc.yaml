---
# Internal ClusterIP Service that the waker uses to reach the
# mc-ragnarok pod. External player traffic does NOT go here — it
# lands on the NodePort Service "mc-ragnarok-nodeport" (same
# directory) which selects the waker pod instead.
#
# The selector below matches the label the mc-ragnarok pod carries.
# Confirm with:
#   oc -n minecraft get pod -l app=mc-ragnarok
apiVersion: v1
kind: Service
metadata:
  name: mc-ragnarok
  labels:
    app.kubernetes.io/part-of: mc-ragnarok
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app: mc-ragnarok
  ports:
    - name: mc-java
      port: 25565
      targetPort: 25565
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: mc-ragnarok-bedrock
  labels:
    app.kubernetes.io/part-of: mc-ragnarok
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app: mc-ragnarok
  ports:
    - name: mc-bedrock
      port: 19132
      targetPort: 19132
      protocol: UDP
