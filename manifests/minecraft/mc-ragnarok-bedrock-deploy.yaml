apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mc-ragnarok
    app.kubernetes.io/instance: mc-ragnarok
  name: mc-ragnarok
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: mc-ragnarok
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mc-ragnarok
        app.kubernetes.io/instance: mc-ragnarok
        app.kubernetes.io/name: mc-ragnarok
    spec:
      containers:
      - env:
        - name: EULA
          value: "TRUE"
        - name: TYPE
          value: VANILLA
        - name: VERSION
          value: 1.21.11
        - name: DIFFICULTY
          value: normal
        - name: MODE
          value: survival
        - name: MOTD
          value: Welcome to the CMA Workshop!
        - name: LEVEL_TYPE
          value: DEFAULT
        - name: LEVEL
          value: ragnarok
        - name: MODRINTH_DOWNLOAD_DEPENDENCIES
          value: none
        - name: MEMORY
          value: 1024M
        - name: ENABLE_RCON
          value: "false"
        - name: CF_API_KEY
          valueFrom:
            secretKeyRef:
              key: cf-api-key
              name: mc-ragnarok-curseforge
        - name: CF_PARALLEL_DOWNLOADS
          value: "4"
        image: docker.io/itzg/minecraft-server:latest
        imagePullPolicy: Always
        livenessProbe:
          exec:
            command:
            - mc-health
          failureThreshold: 20
          initialDelaySeconds: 30
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 1
        name: mc-ragnarok
        ports:
        - containerPort: 25565
          name: minecraft
          protocol: TCP
        readinessProbe:
          exec:
            command:
            - mc-health
          failureThreshold: 20
          initialDelaySeconds: 30
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        stdin: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        tty: true
        volumeMounts:
        - mountPath: /tmp
          name: tmp
        - mountPath: /data
          name: datadir
        - mountPath: /backups
          name: backupdir
          readOnly: true
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      volumes:
      - emptyDir: {}
        name: tmp
      - name: datadir
        persistentVolumeClaim:
          claimName: mc-ragnarok-datadir
      - emptyDir: {}
        name: backupdir
